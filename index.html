<!-- index.html completo -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Movies Search</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,600,0,0" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Monoton&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="logo">
                <span class="material-symbols-outlined">looks</span>
                PLATO
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search free YouTube movies by title, actor, director...">
                <button id="searchBtn">Search</button>
            </div>
            <div id="history"></div>
            <div style="display: flex; justify-content: flex-end; margin-top: 10px;">
                <button id="clearStorageBtn" style="background: #333; color: white; border: none; padding: 6px 12px; border-radius: 8px; cursor: pointer;">🗑️ Borrar todo</button>
            </div>
        </div>
    </div>

    <div class="container">
        <div id="searchView">
            <div id="results" class="results"></div>
            <button id="loadMoreBtn" style="display:none;">Cargar más resultados</button>
            <div id="loading" class="loading" style="display:none;">🔍 Buscando películas...</div>
            <div id="stats" class="stats"></div>
        </div>

        <div id="historyView" style="display:none;">
            <div class="history-header">
                <button id="backToSearchBtn" class="secondary-btn">← Back to search</button>
                <h2>Saved movies</h2>
            </div>
            <div id="savedMoviesList" class="results"></div>
            <div id="historyStats" class="stats"></div>
        </div>

        <div id="movieModal" class="modal" style="display:none;">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <div id="modalBody"></div>
                <button id="watchMovieBtn" class="primary-btn">Ver película en YouTube</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
