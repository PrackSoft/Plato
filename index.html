<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plato - New Architecture</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Monoton&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">    
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Filled:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet">
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="navbar">
                <div class="logo">
                    <span class="material-symbols-outlined" id="logoIcon">looks</span>
                    PLATO
                </div>
                <button id="settingsBtn" class="btn btn-secondary" title="Settings">
                    <span class="material-symbols-outlined">settings</span>
                </button>
            </div>

            <div class="search-box">
                <div class="dropdown-search">
                    <button id="searchInBtn" class="btn btn-primary">
                        <span class="material-symbols-outlined">subscriptions</span> All Channels
                        <span class="material-symbols-outlined">arrow_drop_down</span>
                    </button>
                    <div id="searchInPanel" class="dropdown-panel hidden"></div>
                </div>
                <input type="text" id="searchInput" placeholder="Search movies..." autocomplete="off">
                <button id="searchBtn" class="btn btn-secondary">Search</button>
            </div>

            <div class="top-controls">
                <div class="filter-buttons">
                    <button id="filterTrashBtn" class="btn btn-secondary">
                        <span class="material-symbols-outlined">delete</span> Trashcan
                    </button>
                    <button id="filterWatchingBtn" class="btn btn-secondary">
                        <span class="material-symbols-outlined">visibility</span> Watching
                    </button>
                    <button id="filterFavoriteBtn" class="btn btn-secondary">
                        <span class="material-symbols-outlined">star</span> Favorites
                    </button>
                </div>
            </div>

            <div id="termsBar" class="terms-bar"></div>
            <div id="resultsGrid" class="results"></div>
        </div>
    </div>

    <!-- Sidebar (settings panel) -->
    <div id="settingsSidebar" class="sidebar hidden">
        <div class="sidebar-header">
            <h2>Settings</h2>
            <button id="closeSidebarBtn" class="btn btn-secondary">✕</button>
        </div>
        <div class="sidebar-section">
            <h3>Manage Terms</h3>
            <div id="termsManagementList" class="terms-management-list">
                <!-- terms will be populated here -->
            </div>
        </div>
    </div>
    <div id="sidebarOverlay" class="sidebar-overlay hidden"></div>

    <div id="movieModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
            <button id="watchMovieBtn" class="btn btn-primary modal-watch-btn">Watch on YouTube</button>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
