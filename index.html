<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plato - New Architecture</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Monoton&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,600,0,0" rel="stylesheet">
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="logo">
                <span class="material-symbols-outlined" id="logoIcon">looks</span>
                PLATO
            </div>

            <div class="search-box">
                <div class="dropdown-search">
                    <button id="searchInBtn" class="channel-btn">
                        <span class="material-symbols-outlined">subscriptions</span> Search in
                        <span class="material-symbols-outlined">arrow_drop_down</span>
                    </button>
                    <div id="searchInPanel" class="dropdown-panel hidden"></div>
                </div>
                <input type="text" id="searchInput" placeholder="Search movies..." autocomplete="off">
                <button id="searchBtn">Search</button>
            </div>

            <div class="top-controls">
                <div class="channel-controls">
                    
                    <div class="dropdown-filter">
                        <button id="showChannelsBtn" class="channel-btn">
                            <span class="material-symbols-outlined">live_tv</span> Show channels
                            <span class="material-symbols-outlined">arrow_drop_down</span>
                        </button>
                        <div id="showChannelsPanel" class="dropdown-panel hidden"></div>
                    </div>
                </div>

                <div class="filter-buttons">
                    <button id="filterTrashBtn" class="filter-btn">
                        <span class="material-symbols-outlined">delete</span> Trashcan
                    </button>
                    <button id="filterWatchingBtn" class="filter-btn">
                        <span class="material-symbols-outlined">visibility</span> Watching
                    </button>
                    <button id="filterFavoriteBtn" class="filter-btn">
                        <span class="material-symbols-outlined">star</span> Favorites
                    </button>
                </div>

            </div>
            <!-- Terms bar (dynamic buttons) -->
            <div id="termsBar" class="terms-bar"></div>

            <div id="resultsGrid" class="results"></div>
        </div>
    </div>
    <div id="movieModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modalBody"></div>
            <button id="watchMovieBtn" class="primary-btn">Watch on YouTube</button>
        </div>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
