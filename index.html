<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Movies Search</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,600,0,0" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Monoton&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <div class="container">
            <!-- Navbar -->
                <!-- Hacer botón de menú con el span, para desplegar modal oculto en columna izquierda, que incluye links para navegar la página -->
            <div class="logo">
                <span class="material-symbols-outlined">looks</span>
                PLATO
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search free YouTube movies by title, actor, director..." autocomplete="off">
                <button id="searchBtn">Search</button>
            </div>

            <!-- Tags -->
            <div class="search-wrapper">
                <div id="fullSearch"></div>
                <button id="clearStorageBtn" class="full-search-btn material-symbols-outlined">delete_forever</button>
            </div>

            <!-- ? -->
            <div id="searchView">
                <div id="results" class="results"></div>
                <button id="loadMoreBtn" style="display:none;">Cargar más resultados</button>
                <div id="loading" class="loading material-symbols-outlined" style="display:none;">video_search</div>
                <div id="stats" class="stats"></div>
            </div>

            <!-- History (Filtered by channel "YouTube Movies") -->
            <div id="historyView" style="display:none;">
                <div class="history-header">
                    <h2 id="historyTitle">Saved Free Movies (by date)</h2>
                </div>
                <div id="savedMoviesList" class="results"></div>
                <div id="historyStats" class="stats"></div>
            </div>

            <!-- Full Search View -->
            <div id="fullSearchView" style="display:none;">
                <div class="history-header">
                    <h2 id="fullSearchTitle">Full Search Results (from saved)</h2>
                </div>
                <div id="fullSearchResults" class="results"></div>
                <div id="fullSearchStats" class="stats"></div>
            </div>

            <!-- Modal -->
            <div id="movieModal" class="modal" style="display:none;">
                <div class="modal-content">
                    <span class="close-modal">&times;</span>
                    <div id="modalBody"></div>
                    <button id="watchMovieBtn" class="primary-btn">Watch on YouTube</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
