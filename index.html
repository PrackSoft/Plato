<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plato - New Architecture</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Google Fonts: Monoton and Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Monoton&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,600,0,0" rel="stylesheet">
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="logo">
                <span class="material-symbols-outlined" id="logoIcon">looks</span>
                PLATO
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search movies..." autocomplete="off">
                <button id="searchBtn">Search</button>
            </div>

            <!-- Inside .header .container, after .logo and before .search-box -->
            <div class="channel-controls">
                <!-- Desplegable para búsqueda (exclusivo) -->
                <div class="dropdown-search">
                    <button id="searchChannelBtn" class="channel-btn">
                        <span class="material-symbols-outlined">subscriptions</span> Search in
                        <span class="material-symbols-outlined">arrow_drop_down</span>
                    </button>
                    <select id="searchChannelSelect" class="hidden-select"></select>
                </div>

                <!-- Desplegable para filtro de visualización (inclusivo con checkboxes) -->
                <div class="dropdown-filter">
                    <button id="displayFilterBtn" class="channel-btn">
                        <span class="material-symbols-outlined">live_tv</span> Show Channels
                        <span class="material-symbols-outlined">arrow_drop_down</span>
                    </button>
                    <div id="displayFilterPanel" class="filter-panel hidden">
                        <!-- Los checkboxes se generarán con JS -->
                    </div>
                </div>
            </div>

            <div id="resultsGrid" class="results"></div>
        </div>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
